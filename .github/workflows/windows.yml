name: Windows Release Bundles

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - ".github/workflows/windows.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "src/**"
      - "src-tauri/**"
      - "drizzle/**"
      - "index.html"
      - "vite.config.*"
      - "tsconfig*.json"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  WINDOWS_BUNDLE_ARTIFACT_DIR: .tmp/windows-release-bundles

jobs:
  windows-release-bundles:
    name: Windows release bundles (${{ matrix.platform }})
    runs-on: windows-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            artifact_platform: x64
            rust-target: x86_64-pc-windows-msvc
          - platform: windows-arm64
            artifact_platform: arm64
            rust-target: aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.rust-target }}

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Stamp build metadata
        shell: pwsh
        run: |
          $channel = if ("${{ github.ref_type }}" -eq "tag") { "release" } else { "dev" }
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}".TrimStart("v") } else { "" }
          "NOREA_BUILD_CHANNEL=$channel" >> $env:GITHUB_ENV
          "NOREA_BUILD_VERSION=$version" >> $env:GITHUB_ENV
          "NOREA_BUILD_TIME=$((Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ'))" >> $env:GITHUB_ENV
          "NOREA_GIT_SHA=${{ github.sha }}" >> $env:GITHUB_ENV
          "NOREA_GITHUB_RUN_ID=${{ github.run_id }}" >> $env:GITHUB_ENV
          "NOREA_GITHUB_RUN_ATTEMPT=${{ github.run_attempt }}" >> $env:GITHUB_ENV

      - name: Build Windows release bundle
        run: pnpm tauri build --target ${{ matrix.rust-target }}

      - name: Collect Windows release bundles
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $platform = "${{ matrix.platform }}"
          $artifactPlatform = "${{ matrix.artifact_platform }}"
          $target = "${{ matrix.rust-target }}"
          $bundleRoot = "src-tauri/target/$target/release/bundle"
          $artifactDir = $env:WINDOWS_BUNDLE_ARTIFACT_DIR
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          if (-not (Test-Path $bundleRoot)) {
            throw "Bundle output directory not found: $bundleRoot"
          }

          $bundleFiles = Get-ChildItem -Path $bundleRoot -Recurse -File |
            Where-Object { $_.Extension -in ".msi", ".exe" } |
            Sort-Object FullName

          if ($bundleFiles.Count -eq 0) {
            throw "No Windows release bundle files found under $bundleRoot."
          }

          $byType = @{}
          foreach ($bundleFile in $bundleFiles) {
            $type = switch ($bundleFile.Extension) {
              ".msi" { "msi" }
              ".exe" { "nsis" }
              default { throw "Unsupported Windows bundle extension: $($bundleFile.Extension)" }
            }
            if ($byType.ContainsKey($type)) {
              throw "Expected one $type bundle for $platform, found multiple."
            }
            $byType[$type] = $bundleFile
          }

          foreach ($requiredType in @("msi", "nsis")) {
            if (-not $byType.ContainsKey($requiredType)) {
              throw "Missing $requiredType bundle for $platform."
            }
          }

          $checksumFile = Join-Path $artifactDir "SHA256SUMS-$platform.txt"
          New-Item -ItemType File -Force -Path $checksumFile | Out-Null
          $manifestAssets = @()

          foreach ($type in @("msi", "nsis")) {
            $bundleFile = $byType[$type]
            $extension = $bundleFile.Extension.TrimStart(".")
            $destination = Join-Path $artifactDir "norea-$artifactPlatform.$extension"
            Copy-Item -LiteralPath $bundleFile.FullName -Destination $destination
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $destination).Hash.ToLowerInvariant()
            $assetName = Split-Path -Leaf $destination
            Add-Content -Path $checksumFile -Value "$hash  $assetName"
            $manifestAssets += [ordered]@{
              name = $assetName
              artifactName = $assetName
              platform = $platform
              size = (Get-Item -LiteralPath $destination).Length
              sha256 = $hash
              signature = $null
              signingKeyId = $null
            }
          }

          $channel = if ("${{ github.ref_type }}" -eq "tag") { "stable" } else { "dev" }
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}".TrimStart("v") } else { $null }
          $dev = if ($channel -eq "dev") {
            [ordered]@{
              workflow = "windows.yml"
              runId = "${{ github.run_id }}"
              runAttempt = "${{ github.run_attempt }}"
              headSha = "${{ github.sha }}"
              artifactName = $null
            }
          } else {
            $null
          }
          $manifest = [ordered]@{
            schemaVersion = 1
            channel = $channel
            platform = $platform
            version = $version
            generatedAt = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            assets = $manifestAssets
            signature = $null
            signingKeyId = $null
            dev = $dev
          }
          $manifestPath = Join-Path $artifactDir "norea-updates-$platform.json"
          $manifest | ConvertTo-Json -Depth 8 | Set-Content -Path $manifestPath -Encoding utf8

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v7
        with:
          name: norea-${{ matrix.artifact_platform }}.msi
          path: ${{ env.WINDOWS_BUNDLE_ARTIFACT_DIR }}/norea-*.msi
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 30

      - name: Upload Windows NSIS installer
        uses: actions/upload-artifact@v7
        with:
          name: norea-${{ matrix.artifact_platform }}.exe
          path: ${{ env.WINDOWS_BUNDLE_ARTIFACT_DIR }}/norea-*.exe
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 30

      - name: Upload Windows bundle checksums
        uses: actions/upload-artifact@v7
        with:
          name: norea-${{ matrix.platform }}-checksums
          path: ${{ env.WINDOWS_BUNDLE_ARTIFACT_DIR }}/SHA256SUMS-${{ matrix.platform }}.txt
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 30

      - name: Upload Windows update metadata
        uses: actions/upload-artifact@v7
        with:
          name: norea-updates-${{ matrix.platform }}
          path: ${{ env.WINDOWS_BUNDLE_ARTIFACT_DIR }}/norea-updates-${{ matrix.platform }}.json
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 30

      - name: Upload Windows bundles to GitHub Release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $assets = Get-ChildItem -Path $env:WINDOWS_BUNDLE_ARTIFACT_DIR -File |
            ForEach-Object { $_.FullName }
          gh release upload "${{ github.ref_name }}" $assets --clobber

      - name: Upload Windows bundles to dev release
        if: github.ref_type != 'tag'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"

          gh release view dev *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create dev --title "Latest dev build" --notes "Latest successful development build assets." --prerelease --target "${{ github.sha }}"
            if ($LASTEXITCODE -ne 0) {
              gh release view dev *> $null
              if ($LASTEXITCODE -ne 0) {
                exit 1
              }
            }
          }

          $assets = Get-ChildItem -Path $env:WINDOWS_BUNDLE_ARTIFACT_DIR -File |
            ForEach-Object { $_.FullName }
          gh release upload dev $assets --clobber

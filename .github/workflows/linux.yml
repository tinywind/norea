name: Linux Release Bundles

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - ".github/workflows/linux.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "src/**"
      - "src-tauri/**"
      - "drizzle/**"
      - "index.html"
      - "vite.config.*"
      - "tsconfig*.json"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LINUX_BUNDLE_ARTIFACT_DIR: .tmp/linux-release-bundles

jobs:
  linux-release-bundles:
    name: Linux release bundles (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-24.04
            rust-target: x86_64-unknown-linux-gnu
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            rust-target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.rust-target }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            rpm \
            wget \
            xdg-utils

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Stamp build metadata
        run: |
          set -euo pipefail

          channel="dev"
          version=""
          if [ "${{ github.ref_type }}" = "tag" ]; then
            channel="release"
            version="${{ github.ref_name }}"
            version="${version#v}"
          fi

          echo "NOREA_BUILD_CHANNEL=$channel" >> "$GITHUB_ENV"
          echo "NOREA_BUILD_VERSION=$version" >> "$GITHUB_ENV"
          echo "NOREA_BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
          echo "NOREA_GIT_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "NOREA_GITHUB_RUN_ID=${GITHUB_RUN_ID}" >> "$GITHUB_ENV"
          echo "NOREA_GITHUB_RUN_ATTEMPT=${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"

      - name: Build Linux release bundle
        run: pnpm tauri build --target ${{ matrix.rust-target }}

      - name: Collect Linux release bundles
        run: |
          set -euo pipefail

          platform="${{ matrix.platform }}"
          target="${{ matrix.rust-target }}"
          bundle_root="src-tauri/target/$target/release/bundle"
          artifact_dir="$LINUX_BUNDLE_ARTIFACT_DIR"
          mkdir -p "$artifact_dir"

          if [ ! -d "$bundle_root" ]; then
            echo "Bundle output directory not found: $bundle_root"
            exit 1
          fi

          collect_one() {
            local type="$1"
            local pattern="$2"
            local files=()

            mapfile -t files < <(find "$bundle_root" -type f -name "$pattern" | sort)
            if [ "${#files[@]}" -eq 0 ]; then
              echo "Missing $type bundle for $platform."
              exit 1
            fi
            if [ "${#files[@]}" -gt 1 ]; then
              echo "Expected one $type bundle for $platform, found multiple."
              printf '%s\n' "${files[@]}"
              exit 1
            fi

            local source_file="${files[0]}"
            local extension="${source_file##*.}"
            local destination="$artifact_dir/norea-$platform.$extension"
            cp "$source_file" "$destination"
            (cd "$artifact_dir" && sha256sum "$(basename "$destination")") >> "$artifact_dir/SHA256SUMS-$platform.txt"
          }

          : > "$artifact_dir/SHA256SUMS-$platform.txt"
          collect_one appimage "*.AppImage"
          collect_one deb "*.deb"
          collect_one rpm "*.rpm"

          channel="dev"
          version=""
          if [ "${{ github.ref_type }}" = "tag" ]; then
            channel="stable"
            version="${{ github.ref_name }}"
            version="${version#v}"
          fi

          UPDATE_CHANNEL="$channel" \
          UPDATE_VERSION="$version" \
          UPDATE_PLATFORM="$platform" \
          UPDATE_WORKFLOW="linux.yml" \
          UPDATE_RUN_ID="$GITHUB_RUN_ID" \
          UPDATE_RUN_ATTEMPT="$GITHUB_RUN_ATTEMPT" \
          UPDATE_HEAD_SHA="$GITHUB_SHA" \
          node <<'NODE'
          const crypto = require("crypto");
          const fs = require("fs");
          const path = require("path");

          const artifactDir = process.env.LINUX_BUNDLE_ARTIFACT_DIR;
          const platform = process.env.UPDATE_PLATFORM;
          const channel = process.env.UPDATE_CHANNEL;
          const version = process.env.UPDATE_VERSION || null;
          const assets = fs.readdirSync(artifactDir)
            .filter((name) => name.startsWith(`norea-${platform}.`))
            .sort()
            .map((name) => {
              const filePath = path.join(artifactDir, name);
              const bytes = fs.readFileSync(filePath);
              return {
                name,
                artifactName: name,
                platform,
                size: bytes.length,
                sha256: crypto.createHash("sha256").update(bytes).digest("hex"),
                signature: null,
                signingKeyId: null,
              };
            });
          const manifest = {
            schemaVersion: 1,
            channel,
            platform,
            version,
            generatedAt: new Date().toISOString().replace(/\.\d{3}Z$/, "Z"),
            assets,
            signature: null,
            signingKeyId: null,
            dev: channel === "dev" ? {
              workflow: process.env.UPDATE_WORKFLOW,
              runId: process.env.UPDATE_RUN_ID,
              runAttempt: process.env.UPDATE_RUN_ATTEMPT,
              headSha: process.env.UPDATE_HEAD_SHA,
              artifactName: null,
            } : null,
          };
          fs.writeFileSync(
            path.join(artifactDir, `norea-updates-${platform}.json`),
            `${JSON.stringify(manifest, null, 2)}\n`,
          );
          NODE

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v7
        with:
          name: norea-${{ matrix.platform }}.AppImage
          path: ${{ env.LINUX_BUNDLE_ARTIFACT_DIR }}/norea-${{ matrix.platform }}.AppImage
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 30

      - name: Upload Linux deb package
        uses: actions/upload-artifact@v7
        with:
          name: norea-${{ matrix.platform }}.deb
          path: ${{ env.LINUX_BUNDLE_ARTIFACT_DIR }}/norea-${{ matrix.platform }}.deb
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 30

      - name: Upload Linux rpm package
        uses: actions/upload-artifact@v7
        with:
          name: norea-${{ matrix.platform }}.rpm
          path: ${{ env.LINUX_BUNDLE_ARTIFACT_DIR }}/norea-${{ matrix.platform }}.rpm
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 30

      - name: Upload Linux bundle checksums
        uses: actions/upload-artifact@v7
        with:
          name: norea-${{ matrix.platform }}-checksums
          path: ${{ env.LINUX_BUNDLE_ARTIFACT_DIR }}/SHA256SUMS-${{ matrix.platform }}.txt
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 30

      - name: Upload Linux update metadata
        uses: actions/upload-artifact@v7
        with:
          name: norea-updates-${{ matrix.platform }}
          path: ${{ env.LINUX_BUNDLE_ARTIFACT_DIR }}/norea-updates-${{ matrix.platform }}.json
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 30

      - name: Upload Linux bundles to GitHub Release
        if: github.ref_type == 'tag'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "$LINUX_BUNDLE_ARTIFACT_DIR"/* --clobber

      - name: Upload Linux bundles to dev release
        if: github.ref_type != 'tag'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if ! gh release view dev >/dev/null 2>&1; then
            gh release create dev \
              --title "Latest dev build" \
              --notes "Latest successful development build assets." \
              --prerelease \
              --target "$GITHUB_SHA" ||
              gh release view dev >/dev/null
          fi

          gh release upload dev "$LINUX_BUNDLE_ARTIFACT_DIR"/* --clobber

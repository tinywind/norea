# CI for Norea.
#
# Fast quality gate for TypeScript, unit tests, and drizzle migration drift.
# Release artifact workflows perform the platform-specific Tauri builds.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (TypeScript check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc

      - name: Generate DB migrations (drift check)
        run: pnpm db:generate
      - name: Fail if drizzle migrations drifted
        run: |
          if ! git diff --exit-code drizzle/; then
            echo "::error::drizzle migrations are out of sync with schema.ts."
            echo "Run 'pnpm db:generate' locally and commit the result."
            exit 1
          fi

      - name: Unit tests
        run: pnpm test

name: Android Release APKs

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - ".github/workflows/android.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "src/**"
      - "src-tauri/**"
      - "drizzle/**"
      - "index.html"
      - "vite.config.*"
      - "tsconfig*.json"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_PLATFORM: android-36
  ANDROID_BUILD_TOOLS: 36.0.0
  ANDROID_NDK_VERSION: 27.1.12297006
  RELEASE_SIGNED_APK_DIR: .tmp/android-release-apks

jobs:
  android-release-apks:
    name: Android release APKs
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust Android targets
        run: |
          rustup target add \
            aarch64-linux-android \
            x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Android SDK packages
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null
          "$SDKMANAGER" --install \
            "platform-tools" \
            "platforms;${ANDROID_PLATFORM}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}"
          echo "NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize Android project
        run: |
          if [ ! -d src-tauri/gen/android ]; then
            pnpm tauri android init --ci --skip-targets-install
          fi

      - name: Configure Android release signing secrets
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          signing_dir=".tmp/android-release-signing"

          if [ -n "$ANDROID_RELEASE_KEYSTORE_BASE64" ] &&
             [ -n "$ANDROID_RELEASE_KEY_ALIAS" ] &&
             [ -n "$ANDROID_RELEASE_STORE_PASSWORD" ] &&
             [ -n "$ANDROID_RELEASE_KEY_PASSWORD" ]; then
            mkdir -p "$signing_dir"
            keystore="$(pwd)/$signing_dir/release.jks"
            printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore"
            echo "ANDROID_RELEASE_KEYSTORE_FILE=$keystore" >> "$GITHUB_ENV"
            echo "ANDROID_RELEASE_KEY_ALIAS=$ANDROID_RELEASE_KEY_ALIAS" >> "$GITHUB_ENV"
            echo "ANDROID_RELEASE_STORE_PASSWORD=$ANDROID_RELEASE_STORE_PASSWORD" >> "$GITHUB_ENV"
            echo "ANDROID_RELEASE_KEY_PASSWORD=$ANDROID_RELEASE_KEY_PASSWORD" >> "$GITHUB_ENV"
          else
            mkdir -p "$signing_dir"
            keystore="$(pwd)/$signing_dir/test-release.jks"
            keytool -genkeypair \
              -keystore "$keystore" \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Norea Test Release,O=Norea,C=US"
            echo "ANDROID_RELEASE_KEYSTORE_FILE=$keystore" >> "$GITHUB_ENV"
            echo "ANDROID_RELEASE_KEY_ALIAS=androiddebugkey" >> "$GITHUB_ENV"
            echo "ANDROID_RELEASE_STORE_PASSWORD=android" >> "$GITHUB_ENV"
            echo "ANDROID_RELEASE_KEY_PASSWORD=android" >> "$GITHUB_ENV"
            echo "::warning::Android release signing secrets are not configured; generated a public test release key."
          fi

      - name: Stamp build metadata
        run: |
          set -euo pipefail

          channel="dev"
          version=""
          if [ "${{ github.ref_type }}" = "tag" ]; then
            channel="release"
            version="${{ github.ref_name }}"
            version="${version#v}"
          fi

          echo "NOREA_BUILD_CHANNEL=$channel" >> "$GITHUB_ENV"
          echo "NOREA_BUILD_VERSION=$version" >> "$GITHUB_ENV"
          echo "NOREA_BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
          echo "NOREA_GIT_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "NOREA_GITHUB_RUN_ID=${GITHUB_RUN_ID}" >> "$GITHUB_ENV"
          echo "NOREA_GITHUB_RUN_ATTEMPT=${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"

      - name: Build arm64 and x86_64 release APKs
        run: pnpm android:apk:release

      - name: Collect signed release APKs
        run: |
          set -euo pipefail

          release_apk_root="src-tauri/gen/android/app/build/outputs/apk"
          mkdir -p "$RELEASE_SIGNED_APK_DIR"

          apksigner="${ANDROID_HOME}/build-tools/${ANDROID_BUILD_TOOLS}/apksigner"
          checksum_file="$RELEASE_SIGNED_APK_DIR/SHA256SUMS.txt"
          : > "$checksum_file"

          for release_apk in \
            "$release_apk_root/arm64/release/app-arm64-release.apk" \
            "$release_apk_root/x86_64/release/app-x86_64-release.apk"; do
            if [ ! -f "$release_apk" ]; then
              echo "Expected release APK not found: $release_apk"
              exit 1
            fi

            variant="$(basename "$(dirname "$(dirname "$release_apk")")")"
            collected_apk="$RELEASE_SIGNED_APK_DIR/norea-${variant}.apk"

            "$apksigner" verify --verbose "$release_apk"
            cp "$release_apk" "$collected_apk"
            (cd "$RELEASE_SIGNED_APK_DIR" && sha256sum "$(basename "$collected_apk")") >> "$checksum_file"
          done

          channel="dev"
          version=""
          if [ "${{ github.ref_type }}" = "tag" ]; then
            channel="stable"
            version="${{ github.ref_name }}"
            version="${version#v}"
          fi

          UPDATE_CHANNEL="$channel" \
          UPDATE_VERSION="$version" \
          UPDATE_WORKFLOW="android.yml" \
          UPDATE_RUN_ID="$GITHUB_RUN_ID" \
          UPDATE_RUN_ATTEMPT="$GITHUB_RUN_ATTEMPT" \
          UPDATE_HEAD_SHA="$GITHUB_SHA" \
          node <<'NODE'
          const crypto = require("crypto");
          const fs = require("fs");
          const path = require("path");

          const artifactDir = process.env.RELEASE_SIGNED_APK_DIR;
          const channel = process.env.UPDATE_CHANNEL;
          const version = process.env.UPDATE_VERSION || null;
          const pairs = [
            ["android-arm64", "norea-arm64.apk"],
            ["android-x86_64", "norea-x86_64.apk"],
          ];

          for (const [platform, name] of pairs) {
            const filePath = path.join(artifactDir, name);
            const bytes = fs.readFileSync(filePath);
            const manifest = {
              schemaVersion: 1,
              channel,
              platform,
              version,
              generatedAt: new Date().toISOString().replace(/\.\d{3}Z$/, "Z"),
              assets: [
                {
                  name,
                  artifactName: name,
                  platform,
                  size: bytes.length,
                  sha256: crypto.createHash("sha256").update(bytes).digest("hex"),
                  signature: null,
                  signingKeyId: null,
                },
              ],
              signature: null,
              signingKeyId: null,
              dev: channel === "dev" ? {
                workflow: process.env.UPDATE_WORKFLOW,
                runId: process.env.UPDATE_RUN_ID,
                runAttempt: process.env.UPDATE_RUN_ATTEMPT,
                headSha: process.env.UPDATE_HEAD_SHA,
                artifactName: null,
              } : null,
            };
            fs.writeFileSync(
              path.join(artifactDir, `norea-updates-${platform}.json`),
              `${JSON.stringify(manifest, null, 2)}\n`,
            );
          }
          NODE

      - name: Upload arm64 signed release APK
        uses: actions/upload-artifact@v7
        with:
          name: norea-arm64.apk
          path: ${{ env.RELEASE_SIGNED_APK_DIR }}/norea-arm64.apk
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 30

      - name: Upload x86_64 signed release APK
        uses: actions/upload-artifact@v7
        with:
          name: norea-x86_64.apk
          path: ${{ env.RELEASE_SIGNED_APK_DIR }}/norea-x86_64.apk
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 30

      - name: Upload signed release APK checksums
        uses: actions/upload-artifact@v7
        with:
          name: norea-android-checksums
          path: ${{ env.RELEASE_SIGNED_APK_DIR }}/SHA256SUMS.txt
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 30

      - name: Upload arm64 Android update metadata
        uses: actions/upload-artifact@v7
        with:
          name: norea-updates-android-arm64.json
          path: ${{ env.RELEASE_SIGNED_APK_DIR }}/norea-updates-android-arm64.json
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 30

      - name: Upload x86_64 Android update metadata
        uses: actions/upload-artifact@v7
        with:
          name: norea-updates-android-x86_64.json
          path: ${{ env.RELEASE_SIGNED_APK_DIR }}/norea-updates-android-x86_64.json
          if-no-files-found: error
          archive: false
          compression-level: 0
          retention-days: 30

      - name: Upload signed APKs to GitHub Release
        if: github.ref_type == 'tag'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "$RELEASE_SIGNED_APK_DIR"/* --clobber

      - name: Upload signed APKs to dev release
        if: github.ref_type != 'tag'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if ! gh release view dev >/dev/null 2>&1; then
            gh release create dev \
              --title "Latest dev build" \
              --notes "Latest successful development build assets." \
              --prerelease \
              --target "$GITHUB_SHA" ||
              gh release view dev >/dev/null
          fi

          gh release view dev --json assets --jq '.assets[].name' |
            while IFS= read -r asset_name; do
              case "$asset_name" in
                norea-arm64.apk|norea-x86_64.apk)
                  ;;
                norea-arm64*apk*|norea-x86_64*apk*|norea-signed-release-apk-checksums)
                  gh release delete-asset dev "$asset_name" --yes || true
                  ;;
              esac
            done

          gh release upload dev "$RELEASE_SIGNED_APK_DIR"/* --clobber
